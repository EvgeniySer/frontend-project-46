name: ESLint&tests-check

on: push

jobs:
  ESLint:
    name: Lint code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # или '16', если требуется
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci  # вместо npm i для воспроизводимости

      - name: Lint
        run: make lint

      - name: Run tests with coverage
        run: |
          NODE_OPTIONS=--no-experimental-fetch npm test -- --coverage --coverageProvider=v8

      - name: CodeClimate Coverage
        uses: paambaati/codeclimate-action@v3
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}
        with:
          coverageCommand: NODE_OPTIONS=--no-experimental-fetch make test-coverage
          debug: true
